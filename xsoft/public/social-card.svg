<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="900" cy="150" r="200" fill="#818cf8" opacity="0.05"/>
  <circle cx="300" cy="500" r="150" fill="#60a5fa" opacity="0.05"/>
  <!-- X mark logo -->
  <g transform="translate(100, 200)">
    <path d="M20 20L80 130M80 20L20 130" stroke="url(#accent)" stroke-width="12" stroke-linecap="round"/>
    <circle cx="50" cy="75" r="12" fill="url(#accent)"/>
    <circle cx="50" cy="75" r="5" fill="#0f172a"/>
    <circle cx="20" cy="20" r="6" fill="url(#accent)"/>
    <circle cx="80" cy="20" r="6" fill="url(#accent)"/>
    <circle cx="20" cy="130" r="6" fill="url(#accent)"/>
    <circle cx="80" cy="130" r="6" fill="url(#accent)"/>
  </g>
  <!-- Text -->
  <text x="220" y="270" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="900" fill="url(#accent)">xSoft</text>
  <text x="220" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#94a3b8">AI-Powered Software Solutions</text>
  <!-- Services -->
  <text x="220" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#64748b">AI Chatbots · Web Development · Chrome Extensions · SEO</text>
  <!-- URL -->
  <text x="220" y="500" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#6366f1">xsoftlimited.com</text>
  <!-- Border accent -->
  <rect x="0" y="620" width="1200" height="10" fill="url(#accent)"/>
</svg>
