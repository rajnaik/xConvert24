<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" fill="none">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <radialGradient id="lens4" cx="0.4" cy="0.35" r="0.6">
      <stop offset="0%" stop-color="#ecfdf5" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#d1fae5" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#6ee7b7" stop-opacity="0.08"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="300" fill="url(#bg4)"/>
  <!-- Antique magnifying glass — far right -->
  <g transform="translate(980, 45)">
    <circle cx="72" cy="72" r="56" fill="url(#lens4)"/>
    <circle cx="72" cy="72" r="56" fill="none" stroke="#9ca3af" stroke-width="5.5"/>
    <circle cx="72" cy="72" r="56" fill="none" stroke="#d1d5db" stroke-width="1.5" opacity="0.4"/>
    <ellipse cx="53" cy="50" rx="16" ry="9" fill="white" opacity="0.36" transform="rotate(-28, 53, 50)"/>
    <!-- Tiles through lens -->
    <rect x="46" y="52" width="26" height="26" rx="3" fill="#f8fafc" opacity="0.8"/>
    <text x="59" y="71" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#1e1b4b" text-anchor="middle">W</text>
    <rect x="76" y="52" width="26" height="26" rx="3" fill="#f8fafc" opacity="0.8"/>
    <text x="89" y="71" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#1e1b4b" text-anchor="middle">I</text>
    <rect x="46" y="82" width="26" height="26" rx="3" fill="#f8fafc" opacity="0.8"/>
    <text x="59" y="101" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#1e1b4b" text-anchor="middle">Z</text>
    <rect x="76" y="82" width="26" height="26" rx="3" fill="#f8fafc" opacity="0.8"/>
    <text x="89" y="101" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#1e1b4b" text-anchor="middle">A</text>
    <!-- Ferrule + Handle -->
    <line x1="114" y1="114" x2="121" y2="121" stroke="#fbbf24" stroke-width="10" stroke-linecap="round"/>
    <line x1="121" y1="121" x2="168" y2="168" stroke="#1c1917" stroke-width="13" stroke-linecap="round"/>
    <line x1="121" y1="121" x2="168" y2="168" stroke="#44403c" stroke-width="9" stroke-linecap="round"/>
  </g>
  <!-- S tiles scattered -->
  <g opacity="0.65">
    <rect x="50" y="30" width="40" height="40" rx="5" fill="#f8fafc" transform="rotate(6 70 50)"/>
    <text x="70" y="57" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#1e1b4b" text-anchor="middle" transform="rotate(6 70 50)">S</text>
    <rect x="100" y="220" width="40" height="40" rx="5" fill="#f8fafc" transform="rotate(-8 120 240)"/>
    <text x="120" y="247" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#1e1b4b" text-anchor="middle" transform="rotate(-8 120 240)">S</text>
    <rect x="930" y="240" width="38" height="38" rx="5" fill="#f8fafc" transform="rotate(10 949 259)"/>
    <text x="949" y="265" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#1e1b4b" text-anchor="middle" transform="rotate(10 949 259)">S</text>
    <rect x="350" y="250" width="38" height="38" rx="5" fill="#f8fafc" transform="rotate(-5 369 269)"/>
    <text x="369" y="275" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#1e1b4b" text-anchor="middle" transform="rotate(-5 369 269)">S</text>
  </g>
  <g opacity="0.4">
    <rect x="150" y="130" width="34" height="34" rx="4" fill="#e0e7ff" transform="rotate(14 167 147)"/>
    <text x="167" y="153" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#312e81" text-anchor="middle" transform="rotate(14 167 147)">R</text>
  </g>
  <!-- Title -->
  <text x="560" y="120" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="800" fill="white" text-anchor="middle" letter-spacing="-1">Scrabble Word Finder</text>
  <text x="560" y="170" font-family="Inter, system-ui, sans-serif" font-size="28" fill="#c4b5fd" text-anchor="middle">No-signup word tool — free forever</text>
</svg>
