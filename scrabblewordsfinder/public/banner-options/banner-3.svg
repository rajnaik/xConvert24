<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" fill="none">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#0c0a1d"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <radialGradient id="lens3" cx="0.38" cy="0.33" r="0.6">
      <stop offset="0%" stop-color="#ecfdf5" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#d1fae5" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#6ee7b7" stop-opacity="0.08"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="300" fill="url(#bg3)"/>
  <!-- Antique magnifying glass — far left -->
  <g transform="translate(30, 55)">
    <circle cx="75" cy="75" r="58" fill="url(#lens3)"/>
    <circle cx="75" cy="75" r="58" fill="none" stroke="#a1a1aa" stroke-width="5.5"/>
    <circle cx="75" cy="75" r="58" fill="none" stroke="#d4d4d8" stroke-width="1.5" opacity="0.4"/>
    <ellipse cx="55" cy="52" rx="17" ry="9" fill="white" opacity="0.38" transform="rotate(-28, 55, 52)"/>
    <!-- Tiles through lens -->
    <rect x="48" y="55" width="26" height="26" rx="3" fill="#f8fafc" opacity="0.8"/>
    <text x="61" y="74" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#1e1b4b" text-anchor="middle">J</text>
    <rect x="78" y="55" width="26" height="26" rx="3" fill="#f8fafc" opacity="0.8"/>
    <text x="91" y="74" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#1e1b4b" text-anchor="middle">I</text>
    <rect x="48" y="85" width="26" height="26" rx="3" fill="#f8fafc" opacity="0.8"/>
    <text x="61" y="104" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#1e1b4b" text-anchor="middle">G</text>
    <rect x="78" y="85" width="26" height="26" rx="3" fill="#f8fafc" opacity="0.8"/>
    <text x="91" y="104" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#1e1b4b" text-anchor="middle">S</text>
    <!-- Ferrule + Handle -->
    <line x1="120" y1="120" x2="127" y2="127" stroke="#fbbf24" stroke-width="10" stroke-linecap="round"/>
    <line x1="127" y1="127" x2="175" y2="175" stroke="#1c1917" stroke-width="13" stroke-linecap="round"/>
    <line x1="127" y1="127" x2="175" y2="175" stroke="#3f3f46" stroke-width="9" stroke-linecap="round"/>
  </g>
  <!-- S tiles -->
  <g opacity="0.65">
    <rect x="1040" y="25" width="40" height="40" rx="5" fill="#f8fafc" transform="rotate(10 1060 45)"/>
    <text x="1060" y="52" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#1e1b4b" text-anchor="middle" transform="rotate(10 1060 45)">S</text>
    <rect x="1070" y="210" width="40" height="40" rx="5" fill="#f8fafc" transform="rotate(-7 1090 230)"/>
    <text x="1090" y="237" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#1e1b4b" text-anchor="middle" transform="rotate(-7 1090 230)">S</text>
    <rect x="300" y="240" width="38" height="38" rx="5" fill="#f8fafc" transform="rotate(5 319 259)"/>
    <text x="319" y="265" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#1e1b4b" text-anchor="middle" transform="rotate(5 319 259)">S</text>
    <rect x="280" y="20" width="38" height="38" rx="5" fill="#f8fafc" transform="rotate(-8 299 39)"/>
    <text x="299" y="45" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#1e1b4b" text-anchor="middle" transform="rotate(-8 299 39)">S</text>
  </g>
  <g opacity="0.4">
    <rect x="1120" y="120" width="34" height="34" rx="4" fill="#e0e7ff" transform="rotate(9 1137 137)"/>
    <text x="1137" y="143" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#312e81" text-anchor="middle" transform="rotate(9 1137 137)">K</text>
  </g>
  <!-- Title -->
  <text x="640" y="120" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="800" fill="white" text-anchor="middle" letter-spacing="-1">Scrabble Word Finder</text>
  <text x="640" y="170" font-family="Inter, system-ui, sans-serif" font-size="28" fill="#a5b4fc" text-anchor="middle">Instant word solver — realtime as you type</text>
