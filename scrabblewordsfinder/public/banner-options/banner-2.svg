<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" fill="none">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#581c87"/>
    </linearGradient>
    <radialGradient id="lens2" cx="0.4" cy="0.35" r="0.6">
      <stop offset="0%" stop-color="#ecfdf5" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#d1fae5" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#6ee7b7" stop-opacity="0.08"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="300" fill="url(#bg2)"/>
  <!-- Antique magnifying glass — far right -->
  <g transform="translate(980, 40)">
    <circle cx="70" cy="70" r="55" fill="url(#lens2)"/>
    <circle cx="70" cy="70" r="55" fill="none" stroke="#9ca3af" stroke-width="5.5"/>
    <circle cx="70" cy="70" r="55" fill="none" stroke="#d1d5db" stroke-width="2" opacity="0.4"/>
    <ellipse cx="52" cy="48" rx="16" ry="9" fill="white" opacity="0.35" transform="rotate(-25, 52, 48)"/>
    <!-- Tiles through lens -->
    <rect x="44" y="52" width="26" height="26" rx="3" fill="#f8fafc" opacity="0.8"/>
    <text x="57" y="71" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#1e1b4b" text-anchor="middle">Q</text>
    <rect x="74" y="52" width="26" height="26" rx="3" fill="#f8fafc" opacity="0.8"/>
    <text x="87" y="71" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#1e1b4b" text-anchor="middle">U</text>
    <rect x="44" y="82" width="26" height="26" rx="3" fill="#f8fafc" opacity="0.8"/>
    <text x="57" y="101" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#1e1b4b" text-anchor="middle">A</text>
    <rect x="74" y="82" width="26" height="26" rx="3" fill="#f8fafc" opacity="0.8"/>
    <text x="87" y="101" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#1e1b4b" text-anchor="middle">R</text>
    <!-- Ferrule + Handle -->
    <line x1="112" y1="112" x2="118" y2="118" stroke="#fbbf24" stroke-width="10" stroke-linecap="round"/>
    <line x1="118" y1="118" x2="165" y2="165" stroke="#1c1917" stroke-width="13" stroke-linecap="round"/>
    <line x1="118" y1="118" x2="165" y2="165" stroke="#44403c" stroke-width="9" stroke-linecap="round"/>
  </g>
  <!-- S tiles scattered -->
  <g opacity="0.65">
    <rect x="50" y="30" width="40" height="40" rx="5" fill="#f8fafc" transform="rotate(-5 70 50)"/>
    <text x="70" y="57" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#1e1b4b" text-anchor="middle" transform="rotate(-5 70 50)">S</text>
    <rect x="100" y="220" width="40" height="40" rx="5" fill="#f8fafc" transform="rotate(10 120 240)"/>
    <text x="120" y="247" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#1e1b4b" text-anchor="middle" transform="rotate(10 120 240)">S</text>
    <rect x="900" y="240" width="38" height="38" rx="5" fill="#f8fafc" transform="rotate(-6 919 259)"/>
    <text x="919" y="265" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#1e1b4b" text-anchor="middle" transform="rotate(-6 919 259)">S</text>
  </g>
  <g opacity="0.4">
    <rect x="180" y="100" width="34" height="34" rx="4" fill="#e0e7ff" transform="rotate(-12 197 117)"/>
    <text x="197" y="123" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#312e81" text-anchor="middle" transform="rotate(-12 197 117)">Z</text>
    <rect x="140" y="170" width="34" height="34" rx="4" fill="#e0e7ff" transform="rotate(8 157 187)"/>
    <text x="157" y="193" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#312e81" text-anchor="middle" transform="rotate(8 157 187)">X</text>
  </g>
  <!-- Title -->
  <text x="560" y="120" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="800" fill="white" text-anchor="middle" letter-spacing="-1">Scrabble Word Finder</text>
  <text x="560" y="170" font-family="Inter, system-ui, sans-serif" font-size="28" fill="#a5b4fc" text-anchor="middle">Best Scrabble helper — no signup required</text>
</svg>
