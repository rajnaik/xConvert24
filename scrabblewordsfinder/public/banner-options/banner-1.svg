<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" fill="none">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <radialGradient id="lens1" cx="0.4" cy="0.35" r="0.6">
      <stop offset="0%" stop-color="#ecfdf5" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#d1fae5" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#6ee7b7" stop-opacity="0.08"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="300" fill="url(#bg1)"/>
  <!-- Antique magnifying glass — far left, tiles visible through lens -->
  <g transform="translate(40, 50)">
    <!-- Lens -->
    <circle cx="80" cy="80" r="60" fill="url(#lens1)"/>
    <circle cx="80" cy="80" r="60" fill="none" stroke="#9ca3af" stroke-width="6"/>
    <circle cx="80" cy="80" r="60" fill="none" stroke="#d1d5db" stroke-width="2" stroke-dasharray="0" opacity="0.5"/>
    <!-- Glare -->
    <ellipse cx="58" cy="55" rx="18" ry="10" fill="white" opacity="0.35" transform="rotate(-30, 58, 55)"/>
    <!-- Tiles visible through lens -->
    <rect x="50" y="60" width="28" height="28" rx="3" fill="#f8fafc" opacity="0.8"/>
    <text x="64" y="80" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#1e1b4b" text-anchor="middle">S</text>
    <rect x="82" y="60" width="28" height="28" rx="3" fill="#f8fafc" opacity="0.8"/>
    <text x="96" y="80" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#1e1b4b" text-anchor="middle">C</text>
    <rect x="50" y="92" width="28" height="28" rx="3" fill="#f8fafc" opacity="0.8"/>
    <text x="64" y="112" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#1e1b4b" text-anchor="middle">O</text>
    <rect x="82" y="92" width="28" height="28" rx="3" fill="#f8fafc" opacity="0.8"/>
    <text x="96" y="112" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#1e1b4b" text-anchor="middle">R</text>
    <!-- Gold ferrule -->
    <rect x="126" y="126" width="14" height="10" rx="2" fill="#fbbf24" transform="rotate(45, 133, 131)"/>
    <!-- Handle -->
    <line x1="135" y1="135" x2="185" y2="185" stroke="#1c1917" stroke-width="14" stroke-linecap="round"/>
    <line x1="135" y1="135" x2="185" y2="185" stroke="#44403c" stroke-width="10" stroke-linecap="round"/>
    <line x1="135" y1="135" x2="145" y2="145" stroke="#fbbf24" stroke-width="10" stroke-linecap="round"/>
  </g>
  <!-- S tiles scattered around -->
  <g opacity="0.65">
    <rect x="1020" y="30" width="40" height="40" rx="5" fill="#f8fafc" transform="rotate(8 1040 50)"/>
    <text x="1040" y="57" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#1e1b4b" text-anchor="middle" transform="rotate(8 1040 50)">S</text>
    <rect x="1080" y="200" width="40" height="40" rx="5" fill="#f8fafc" transform="rotate(-10 1100 220)"/>
    <text x="1100" y="227" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#1e1b4b" text-anchor="middle" transform="rotate(-10 1100 220)">S</text>
    <rect x="320" y="240" width="38" height="38" rx="5" fill="#f8fafc" transform="rotate(6 339 259)"/>
    <text x="339" y="265" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#1e1b4b" text-anchor="middle" transform="rotate(6 339 259)">S</text>
  </g>
  <!-- Extra scattered tiles -->
  <g opacity="0.4">
    <rect x="1000" y="130" width="34" height="34" rx="4" fill="#e0e7ff" transform="rotate(-7 1017 147)"/>
    <text x="1017" y="153" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#312e81" text-anchor="middle" transform="rotate(-7 1017 147)">W</text>
    <rect x="1100" y="110" width="34" height="34" rx="4" fill="#e0e7ff" transform="rotate(12 1117 127)"/>
    <text x="1117" y="133" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#312e81" text-anchor="middle" transform="rotate(12 1117 127)">Q</text>
  </g>
  <!-- Title — fixed center position -->
  <text x="620" y="120" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="800" fill="white" text-anchor="middle" letter-spacing="-1">Scrabble Word Finder</text>
  <!-- Subtitle — 3x bigger -->
  <text x="620" y="170" font-family="Inter, system-ui, sans-serif" font-size="28" fill="#c4b5fd" text-anchor="middle">Free word finder tool — instant results</text>
</svg>
