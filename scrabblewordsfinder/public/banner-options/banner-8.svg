<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 80" fill="none">
  <defs>
    <linearGradient id="bg8" x1="0" y1="0" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="80" fill="url(#bg8)"/>
  <!-- Antique magnifying glass (compact) -->
  <g transform="translate(20, 8)">
    <circle cx="28" cy="28" r="22" fill="#ecfdf5" fill-opacity="0.3"/>
    <circle cx="28" cy="28" r="22" fill="none" stroke="#9ca3af" stroke-width="3"/>
    <ellipse cx="20" cy="20" rx="7" ry="4" fill="white" opacity="0.3"/>
    <!-- Letters under lens -->
    <rect x="14" y="18" width="13" height="13" rx="2" fill="white" opacity="0.8"/>
    <text x="20" y="28" font-family="Georgia,serif" font-size="9" font-weight="bold" fill="#1e1b4b" text-anchor="middle">Q</text>
    <rect x="29" y="18" width="13" height="13" rx="2" fill="white" opacity="0.8"/>
    <text x="35" y="28" font-family="Georgia,serif" font-size="9" font-weight="bold" fill="#1e1b4b" text-anchor="middle">U</text>
    <rect x="14" y="33" width="13" height="13" rx="2" fill="white" opacity="0.8"/>
    <text x="20" y="43" font-family="Georgia,serif" font-size="9" font-weight="bold" fill="#1e1b4b" text-anchor="middle">I</text>
    <!-- Handle -->
    <line x1="44" y1="44" x2="47" y2="47" stroke="#fbbf24" stroke-width="4" stroke-linecap="round"/>
    <line x1="47" y1="47" x2="62" y2="62" stroke="#44403c" stroke-width="5" stroke-linecap="round"/>
    <line x1="47" y1="47" x2="62" y2="62" stroke="#1c1917" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- S tiles scattered -->
  <rect x="180" y="10" width="18" height="18" rx="3" fill="white" opacity="0.5" transform="rotate(-8 189 19)"/>
  <text x="189" y="23" font-family="Georgia,serif" font-size="10" font-weight="bold" fill="#1e1b4b" text-anchor="middle" transform="rotate(-8 189 19)">S</text>
  <rect x="1020" y="50" width="18" height="18" rx="3" fill="white" opacity="0.5" transform="rotate(10 1029 59)"/>
  <text x="1029" y="63" font-family="Georgia,serif" font-size="10" font-weight="bold" fill="#1e1b4b" text-anchor="middle" transform="rotate(10 1029 59)">S</text>
  <!-- Title -->
  <text x="600" y="35" font-family="Inter,system-ui,sans-serif" font-size="22" font-weight="800" fill="white" text-anchor="middle">Scrabble Word Finder</text>
  <text x="600" y="58" font-family="Inter,system-ui,sans-serif" font-size="13" fill="#c4b5fd" text-anchor="middle">Fast word lookup — 74,000+ words</text>
</svg>
