<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="gwd-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="gwd-shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="gwd-center" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>
  </defs>
  <!-- Badge shield (gold/white) -->
  <path d="M100 10 L180 50 L180 120 Q180 170 100 190 Q20 170 20 120 L20 50 Z" fill="url(#gwd-bg)" stroke="#ffffff" stroke-width="4"/>
  <path d="M100 10 L180 50 L180 85 Q100 95 20 85 L20 50 Z" fill="url(#gwd-shine)"/>
  <!-- Divine halo -->
  <circle cx="100" cy="90" r="30" fill="none" stroke="url(#gwd-center)" stroke-width="3" opacity="0.7"/>
  <circle cx="100" cy="90" r="22" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.5"/>
  <!-- Central divine symbol -->
  <text x="100" y="98" text-anchor="middle" font-family="serif" font-size="28" font-weight="bold" fill="#78350f">W</text>
  <!-- Radiating lines -->
  <line x1="100" y1="55" x2="100" y2="48" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  <line x1="125" y1="65" x2="130" y2="60" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="75" y1="65" x2="70" y2="60" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="135" y1="90" x2="140" y2="90" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="65" y1="90" x2="60" y2="90" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Crown above W -->
  <path d="M85 62 L90 55 L95 60 L100 52 L105 60 L110 55 L115 62" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Diamond count -->
  <text x="100" y="155" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#78350f">1,000,000 💎</text>
  <!-- Title ribbon -->
  <rect x="15" y="28" width="170" height="22" rx="4" fill="#1e1b4b" opacity="0.8"/>
  <text x="100" y="44" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">GRAND WORD DEITY</text>
</svg>
