<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="li-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
    <linearGradient id="li-shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="li-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <!-- Badge shield -->
  <path d="M100 10 L180 50 L180 120 Q180 170 100 190 Q20 170 20 120 L20 50 Z" fill="url(#li-bg)" stroke="#67e8f9" stroke-width="3"/>
  <path d="M100 10 L180 50 L180 85 Q100 95 20 85 L20 50 Z" fill="url(#li-shine)"/>
  <!-- Infinity symbol -->
  <path d="M65 100 C65 85 80 75 90 85 C95 90 100 95 100 100 C100 95 105 90 110 85 C120 75 135 85 135 100 C135 115 120 125 110 115 C105 110 100 105 100 100 C100 105 95 110 90 115 C80 125 65 115 65 100 Z" fill="none" stroke="url(#li-glow)" stroke-width="4"/>
  <!-- Sparkle accents -->
  <circle cx="70" cy="78" r="2" fill="#67e8f9"/>
  <circle cx="130" cy="78" r="2" fill="#67e8f9"/>
  <circle cx="100" cy="130" r="2" fill="#67e8f9"/>
  <!-- Diamond count -->
  <text x="100" y="168" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#fbbf24">250,000 💎</text>
  <!-- Title ribbon -->
  <rect x="15" y="28" width="170" height="22" rx="4" fill="#1e1b4b" opacity="0.7"/>
  <text x="100" y="44" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#a5f3fc">LEXICON IMMORTAL</text>
</svg>
