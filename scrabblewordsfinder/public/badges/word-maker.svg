<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="wm-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="wm-shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Badge shield -->
  <path d="M100 10 L180 50 L180 120 Q180 170 100 190 Q20 170 20 120 L20 50 Z" fill="url(#wm-bg)" stroke="#a78bfa" stroke-width="3"/>
  <path d="M100 10 L180 50 L180 85 Q100 95 20 85 L20 50 Z" fill="url(#wm-shine)"/>
  <!-- Hammer icon -->
  <rect x="88" y="75" width="24" height="30" rx="4" fill="#fbbf24"/>
  <rect x="95" y="100" width="10" height="45" rx="3" fill="#92400e"/>
  <!-- Diamond count -->
  <text x="100" y="170" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#fbbf24">25 💎</text>
  <!-- Title ribbon -->
  <rect x="35" y="28" width="130" height="22" rx="4" fill="#1e1b4b" opacity="0.7"/>
  <text x="100" y="44" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#e9d5ff">WORD MAKER</text>
</svg>
