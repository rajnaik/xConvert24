<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="wb-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="wb-shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Badge shield -->
  <path d="M100 10 L180 50 L180 120 Q180 170 100 190 Q20 170 20 120 L20 50 Z" fill="url(#wb-bg)" stroke="#6ee7b7" stroke-width="3"/>
  <path d="M100 10 L180 50 L180 85 Q100 95 20 85 L20 50 Z" fill="url(#wb-shine)"/>
  <!-- Thumbs up icon -->
  <path d="M85 105 L85 135 Q85 140 90 140 L130 140 Q135 140 135 135 L138 100 Q138 95 133 95 L112 95 L116 75 Q117 70 113 68 L110 68 Q107 68 105 72 L95 95 L90 95 Q85 95 85 100 Z" fill="#fbbf24" stroke="#f59e0b" stroke-width="2"/>
  <!-- Score range -->
  <text x="100" y="170" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#fbbf24">10–19 pts</text>
  <!-- Title ribbon -->
  <rect x="25" y="28" width="150" height="22" rx="4" fill="#064e3b" opacity="0.8"/>
  <text x="100" y="44" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#a7f3d0">WORD BUILDER</text>
</svg>
