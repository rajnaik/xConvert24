<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="ll-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="ll-shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ll-crown" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>
  <!-- Badge shield -->
  <path d="M100 10 L180 50 L180 120 Q180 170 100 190 Q20 170 20 120 L20 50 Z" fill="url(#ll-bg)" stroke="#fcd34d" stroke-width="4"/>
  <path d="M100 10 L180 50 L180 85 Q100 95 20 85 L20 50 Z" fill="url(#ll-shine)"/>
  <!-- Crown -->
  <polygon points="60,105 70,75 85,95 100,65 115,95 130,75 140,105" fill="url(#ll-crown)"/>
  <rect x="60" y="105" width="80" height="15" rx="3" fill="url(#ll-crown)"/>
  <!-- Crown jewels -->
  <circle cx="80" cy="110" r="4" fill="#dc2626"/>
  <circle cx="100" cy="110" r="4" fill="#2563eb"/>
  <circle cx="120" cy="110" r="4" fill="#059669"/>
  <!-- Crown tips -->
  <circle cx="70" cy="75" r="4" fill="#fbbf24"/>
  <circle cx="100" cy="65" r="5" fill="#fbbf24"/>
  <circle cx="130" cy="75" r="4" fill="#fbbf24"/>
  <!-- Sparkles -->
  <circle cx="55" cy="90" r="2.5" fill="#fcd34d" opacity="0.8"/>
  <circle cx="145" cy="90" r="2.5" fill="#fcd34d" opacity="0.8"/>
  <circle cx="100" cy="55" r="2" fill="#fcd34d" opacity="0.8"/>
  <circle cx="50" cy="70" r="1.5" fill="#fcd34d" opacity="0.6"/>
  <circle cx="150" cy="70" r="1.5" fill="#fcd34d" opacity="0.6"/>
  <!-- Diamond count -->
  <text x="100" y="160" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#fef3c7">5,000 💎</text>
  <!-- Title ribbon -->
  <rect x="30" y="28" width="140" height="22" rx="4" fill="#1e1b4b" opacity="0.7"/>
  <text x="100" y="44" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#fef3c7">LEX LEGEND</text>
</svg>
