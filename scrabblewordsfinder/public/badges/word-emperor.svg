<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="we-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a21caf"/>
      <stop offset="100%" stop-color="#86198f"/>
    </linearGradient>
    <linearGradient id="we-shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Badge shield -->
  <path d="M100 10 L180 50 L180 120 Q180 170 100 190 Q20 170 20 120 L20 50 Z" fill="url(#we-bg)" stroke="#f0abfc" stroke-width="3"/>
  <path d="M100 10 L180 50 L180 85 Q100 95 20 85 L20 50 Z" fill="url(#we-shine)"/>
  <!-- Imperial scepter -->
  <rect x="96" y="72" width="8" height="60" rx="3" fill="#fbbf24"/>
  <circle cx="100" cy="68" r="12" fill="#f0abfc" stroke="#d946ef" stroke-width="2"/>
  <circle cx="100" cy="68" r="5" fill="#fbbf24"/>
  <!-- Cross on scepter top -->
  <rect x="98" y="54" width="4" height="10" fill="#fbbf24"/>
  <rect x="94" y="58" width="12" height="4" fill="#fbbf24"/>
  <!-- Ornamental base -->
  <path d="M88 132 L100 125 L112 132 L108 140 L92 140 Z" fill="#d946ef"/>
  <!-- Diamond count -->
  <text x="100" y="168" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#fbbf24">125,000 💎</text>
  <!-- Title ribbon -->
  <rect x="25" y="28" width="150" height="22" rx="4" fill="#1e1b4b" opacity="0.7"/>
  <text x="100" y="44" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#f5d0fe">WORD EMPEROR</text>
</svg>
