<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="tt-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>
    <linearGradient id="tt-shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Badge shield -->
  <path d="M100 10 L180 50 L180 120 Q180 170 100 190 Q20 170 20 120 L20 50 Z" fill="url(#tt-bg)" stroke="#fca5a5" stroke-width="3"/>
  <path d="M100 10 L180 50 L180 85 Q100 95 20 85 L20 50 Z" fill="url(#tt-shine)"/>
  <!-- Scrabble tile stack icon -->
  <rect x="72" y="90" width="28" height="28" rx="3" fill="#fef3c7" stroke="#92400e" stroke-width="1.5"/>
  <text x="86" y="110" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#78350f">T</text>
  <rect x="82" y="80" width="28" height="28" rx="3" fill="#fef3c7" stroke="#92400e" stroke-width="1.5"/>
  <text x="96" y="100" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#78350f">I</text>
  <rect x="100" y="85" width="28" height="28" rx="3" fill="#fef3c7" stroke="#92400e" stroke-width="1.5"/>
  <text x="114" y="105" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#78350f">Z</text>
  <!-- Mountain/Titan peaks -->
  <path d="M55 140 L75 120 L90 135 L100 115 L110 135 L125 120 L145 140 Z" fill="#fecaca" opacity="0.4"/>
  <!-- Diamond count -->
  <text x="100" y="168" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#fbbf24">75,000 💎</text>
  <!-- Title ribbon -->
  <rect x="35" y="28" width="130" height="22" rx="4" fill="#1e1b4b" opacity="0.7"/>
  <text x="100" y="44" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#fecaca">TILE TITAN</text>
</svg>
