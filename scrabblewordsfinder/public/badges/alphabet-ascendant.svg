<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="aa-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4338ca"/>
      <stop offset="100%" stop-color="#3730a3"/>
    </linearGradient>
    <linearGradient id="aa-shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Badge shield -->
  <path d="M100 10 L180 50 L180 120 Q180 170 100 190 Q20 170 20 120 L20 50 Z" fill="url(#aa-bg)" stroke="#a5b4fc" stroke-width="3"/>
  <path d="M100 10 L180 50 L180 85 Q100 95 20 85 L20 50 Z" fill="url(#aa-shine)"/>
  <!-- Rising star / ascension icon -->
  <path d="M100 65 L105 80 L120 80 L108 89 L113 104 L100 95 L87 104 L92 89 L80 80 L95 80 Z" fill="#c7d2fe" stroke="#a5b4fc" stroke-width="1"/>
  <!-- Upward rays -->
  <line x1="100" y1="60" x2="100" y2="50" stroke="#a5b4fc" stroke-width="2" stroke-linecap="round"/>
  <line x1="85" y1="65" x2="78" y2="58" stroke="#a5b4fc" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="115" y1="65" x2="122" y2="58" stroke="#a5b4fc" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Letters A-Z arc -->
  <text x="70" y="130" font-family="serif" font-size="14" font-weight="bold" fill="#c7d2fe" opacity="0.6">A</text>
  <text x="88" y="136" font-family="serif" font-size="14" font-weight="bold" fill="#c7d2fe" opacity="0.7">B</text>
  <text x="106" y="136" font-family="serif" font-size="14" font-weight="bold" fill="#c7d2fe" opacity="0.7">Y</text>
  <text x="122" y="130" font-family="serif" font-size="14" font-weight="bold" fill="#c7d2fe" opacity="0.6">Z</text>
  <!-- Diamond count -->
  <text x="100" y="168" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#fbbf24">500,000 💎</text>
  <!-- Title ribbon -->
  <rect x="10" y="28" width="180" height="22" rx="4" fill="#1e1b4b" opacity="0.7"/>
  <text x="100" y="44" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#c7d2fe">ALPHABET ASCENDANT</text>
</svg>
