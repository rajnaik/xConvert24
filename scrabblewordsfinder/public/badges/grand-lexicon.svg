<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="gl-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b45309"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
    <linearGradient id="gl-shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="gl-gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>
  <!-- Badge shield -->
  <path d="M100 10 L180 50 L180 120 Q180 170 100 190 Q20 170 20 120 L20 50 Z" fill="url(#gl-bg)" stroke="#fbbf24" stroke-width="3"/>
  <path d="M100 10 L180 50 L180 85 Q100 95 20 85 L20 50 Z" fill="url(#gl-shine)"/>
  <!-- Large book -->
  <rect x="60" y="70" width="80" height="65" rx="4" fill="#7c2d12"/>
  <rect x="63" y="73" width="74" height="59" rx="3" fill="#fef3c7"/>
  <line x1="100" y1="73" x2="100" y2="132" stroke="#d97706" stroke-width="1"/>
  <!-- Book spine -->
  <rect x="96" y="70" width="8" height="65" rx="2" fill="url(#gl-gold)"/>
  <!-- Text lines -->
  <line x1="68" y1="85" x2="93" y2="85" stroke="#92400e" stroke-width="1.5" opacity="0.4"/>
  <line x1="68" y1="95" x2="90" y2="95" stroke="#92400e" stroke-width="1.5" opacity="0.4"/>
  <line x1="68" y1="105" x2="92" y2="105" stroke="#92400e" stroke-width="1.5" opacity="0.4"/>
  <line x1="107" y1="85" x2="132" y2="85" stroke="#92400e" stroke-width="1.5" opacity="0.4"/>
  <line x1="107" y1="95" x2="130" y2="95" stroke="#92400e" stroke-width="1.5" opacity="0.4"/>
  <line x1="107" y1="105" x2="128" y2="105" stroke="#92400e" stroke-width="1.5" opacity="0.4"/>
  <!-- Diamond count -->
  <text x="100" y="168" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#fbbf24">1,000 💎</text>
  <!-- Title ribbon -->
  <rect x="25" y="28" width="150" height="22" rx="4" fill="#1e1b4b" opacity="0.7"/>
  <text x="100" y="44" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#fde68a">GRAND LEXICON</text>
</svg>
