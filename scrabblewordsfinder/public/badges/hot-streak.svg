<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="hs-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="hs-shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="hs-flame" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="50%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
  </defs>
  <!-- Badge shield -->
  <path d="M100 10 L180 50 L180 120 Q180 170 100 190 Q20 170 20 120 L20 50 Z" fill="url(#hs-bg)" stroke="#fdba74" stroke-width="3"/>
  <path d="M100 10 L180 50 L180 85 Q100 95 20 85 L20 50 Z" fill="url(#hs-shine)"/>
  <!-- Flame icon -->
  <path d="M100 60 Q115 80 115 95 Q125 80 120 65 Q135 85 130 110 Q130 135 100 140 Q70 135 70 110 Q65 85 80 65 Q75 80 85 95 Q85 80 100 60 Z" fill="url(#hs-flame)" stroke="#fbbf24" stroke-width="2"/>
  <!-- Score range -->
  <text x="100" y="170" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#fbbf24">20–29 pts</text>
  <!-- Title ribbon -->
  <rect x="30" y="28" width="140" height="22" rx="4" fill="#7c2d12" opacity="0.8"/>
  <text x="100" y="44" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#fed7aa">HOT STREAK</text>
</svg>
