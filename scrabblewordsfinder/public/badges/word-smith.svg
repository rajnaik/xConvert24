<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="ws-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="ws-shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Badge shield -->
  <path d="M100 10 L180 50 L180 120 Q180 170 100 190 Q20 170 20 120 L20 50 Z" fill="url(#ws-bg)" stroke="#60a5fa" stroke-width="3"/>
  <path d="M100 10 L180 50 L180 85 Q100 95 20 85 L20 50 Z" fill="url(#ws-shine)"/>
  <!-- Anvil icon -->
  <polygon points="70,110 130,110 140,125 60,125" fill="#94a3b8"/>
  <rect x="85" y="80" width="30" height="30" rx="3" fill="#cbd5e1"/>
  <rect x="93" y="125" width="14" height="15" fill="#64748b"/>
  <!-- Sparks -->
  <circle cx="75" cy="85" r="3" fill="#fbbf24"/>
  <circle cx="125" cy="85" r="3" fill="#fbbf24"/>
  <circle cx="100" cy="70" r="2" fill="#fbbf24"/>
  <!-- Diamond count -->
  <text x="100" y="165" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#60a5fa">100 💎</text>
  <!-- Title ribbon -->
  <rect x="35" y="28" width="130" height="22" rx="4" fill="#1e1b4b" opacity="0.7"/>
  <text x="100" y="44" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#bfdbfe">WORD SMITH</text>
</svg>
