<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="rs-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="rs-shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Badge shield -->
  <path d="M100 10 L180 50 L180 120 Q180 170 100 190 Q20 170 20 120 L20 50 Z" fill="url(#rs-bg)" stroke="#93c5fd" stroke-width="3"/>
  <path d="M100 10 L180 50 L180 85 Q100 95 20 85 L20 50 Z" fill="url(#rs-shine)"/>
  <!-- Star icon -->
  <polygon points="100,55 112,85 145,88 120,108 128,140 100,124 72,140 80,108 55,88 88,85" fill="#fbbf24" stroke="#f59e0b" stroke-width="2"/>
  <!-- Score range -->
  <text x="100" y="170" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#fbbf24">1–9 pts</text>
  <!-- Title ribbon -->
  <rect x="30" y="28" width="140" height="22" rx="4" fill="#1e3a5f" opacity="0.8"/>
  <text x="100" y="44" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#bfdbfe">RISING STAR</text>
</svg>
