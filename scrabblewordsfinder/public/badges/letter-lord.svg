<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="ll-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c2410c"/>
      <stop offset="100%" stop-color="#9a3412"/>
    </linearGradient>
    <linearGradient id="ll-shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Badge shield -->
  <path d="M100 10 L180 50 L180 120 Q180 170 100 190 Q20 170 20 120 L20 50 Z" fill="url(#ll-bg)" stroke="#fdba74" stroke-width="3"/>
  <path d="M100 10 L180 50 L180 85 Q100 95 20 85 L20 50 Z" fill="url(#ll-shine)"/>
  <!-- Crown icon -->
  <path d="M65 105 L75 75 L90 95 L100 68 L110 95 L125 75 L135 105 Z" fill="#fbbf24" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="65" y="105" width="70" height="15" rx="3" fill="#f59e0b"/>
  <!-- Crown jewels -->
  <circle cx="80" cy="110" r="3" fill="#ef4444"/>
  <circle cx="100" cy="110" r="3" fill="#3b82f6"/>
  <circle cx="120" cy="110" r="3" fill="#10b981"/>
  <!-- Letter L emblem -->
  <text x="100" y="145" text-anchor="middle" font-family="serif" font-size="22" font-weight="bold" fill="#fff7ed">L</text>
  <!-- Diamond count -->
  <text x="100" y="170" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#fbbf24">40,000 💎</text>
  <!-- Title ribbon -->
  <rect x="30" y="28" width="140" height="22" rx="4" fill="#1e1b4b" opacity="0.7"/>
  <text x="100" y="44" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#fed7aa">LETTER LORD</text>
</svg>
