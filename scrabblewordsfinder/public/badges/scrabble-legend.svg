<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="sl-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="sl-shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="sl-star" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <!-- Badge shield -->
  <path d="M100 10 L180 50 L180 120 Q180 170 100 190 Q20 170 20 120 L20 50 Z" fill="url(#sl-bg)" stroke="#c4b5fd" stroke-width="3"/>
  <path d="M100 10 L180 50 L180 85 Q100 95 20 85 L20 50 Z" fill="url(#sl-shine)"/>
  <!-- Glowing star -->
  <polygon points="100,55 112,82 142,86 120,106 126,136 100,122 74,136 80,106 58,86 88,82" fill="url(#sl-star)" stroke="#fbbf24" stroke-width="2"/>
  <!-- Sparkle accents -->
  <circle cx="65" cy="65" r="3" fill="#fde68a" opacity="0.8"/>
  <circle cx="135" cy="68" r="2.5" fill="#fde68a" opacity="0.7"/>
  <circle cx="145" cy="115" r="2" fill="#fde68a" opacity="0.6"/>
  <circle cx="55" cy="110" r="2" fill="#fde68a" opacity="0.6"/>
  <!-- Score range -->
  <text x="100" y="170" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#fbbf24">50+ pts</text>
  <!-- Title ribbon -->
  <rect x="20" y="28" width="160" height="22" rx="4" fill="#2e1065" opacity="0.8"/>
  <text x="100" y="44" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#e9d5ff">SCRABBLE LEGEND</text>
</svg>
