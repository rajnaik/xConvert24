  <polygon points="100,70 55,95 100,115 145,95" fill="#1f2937"/>
  <rect x="93" y="68" width="14" height="6" rx="2" fill="#1f2937"/>
  <line x1="135" y1="95" x2="135" y2="125" stroke="#fbbf24" stroke-width="2"/>
  <circle cx="135" cy="128" r="4" fill="#fbbf24"/>
  <!-- Open book -->
  <path d="M75 120 Q100 115 100 130 Q100 115 125 120 L125 145 Q100 140 100 155 Q100 140 75 145 Z" fill="#fef3c7" stroke="#92400e" stroke-width="1.5"/>
  <!-- Diamond count -->
  <text x="100" y="175" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#34d399">250 💎</text>
  <!-- Title ribbon -->
  <rect x="30" y="28" width="140" height="22" rx="4" fill="#1e1b4b" opacity="0.7"/>
  <text x="100" y="44" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#a7f3d0">WORD MASTER</text>
</svg>
