<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="ww-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="ww-shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Badge shield -->
  <path d="M100 10 L180 50 L180 120 Q180 170 100 190 Q20 170 20 120 L20 50 Z" fill="url(#ww-bg)" stroke="#a78bfa" stroke-width="3"/>
  <path d="M100 10 L180 50 L180 85 Q100 95 20 85 L20 50 Z" fill="url(#ww-shine)"/>
  <!-- Wizard hat -->
  <polygon points="100,55 70,120 130,120" fill="#312e81"/>
  <ellipse cx="100" cy="120" rx="35" ry="8" fill="#312e81"/>
  <polygon points="100,55 75,115 125,115" fill="#4338ca" opacity="0.5"/>
  <!-- Stars on hat -->
  <circle cx="95" cy="90" r="3" fill="#fbbf24"/>
  <circle cx="108" cy="100" r="2.5" fill="#fbbf24"/>
  <circle cx="88" cy="105" r="2" fill="#fbbf24"/>
  <!-- Magic wand -->
  <line x1="120" y1="100" x2="145" y2="140" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
  <circle cx="120" cy="98" r="4" fill="#fbbf24"/>
  <!-- Sparkles -->
  <circle cx="130" cy="88" r="2" fill="#c4b5fd"/>
  <circle cx="140" cy="95" r="1.5" fill="#c4b5fd"/>
  <circle cx="150" cy="130" r="2" fill="#c4b5fd"/>
  <!-- Diamond count -->
  <text x="100" y="165" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#c4b5fd">500 💎</text>
  <!-- Title ribbon -->
  <rect x="30" y="28" width="140" height="22" rx="4" fill="#1e1b4b" opacity="0.7"/>
  <text x="100" y="44" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#ddd6fe">WORD WIZARD</text>
</svg>
