<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="ss-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#115e59"/>
    </linearGradient>
    <linearGradient id="ss-shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Badge shield -->
  <path d="M100 10 L180 50 L180 120 Q180 170 100 190 Q20 170 20 120 L20 50 Z" fill="url(#ss-bg)" stroke="#5eead4" stroke-width="3"/>
  <path d="M100 10 L180 50 L180 85 Q100 95 20 85 L20 50 Z" fill="url(#ss-shine)"/>
  <!-- Owl body -->
  <ellipse cx="100" cy="110" rx="28" ry="32" fill="#374151"/>
  <!-- Owl head -->
  <circle cx="100" cy="82" r="20" fill="#4b5563"/>
  <!-- Ear tufts -->
  <polygon points="85,65 80,50 90,68" fill="#4b5563"/>
  <polygon points="115,65 120,50 110,68" fill="#4b5563"/>
  <!-- Eyes -->
  <circle cx="91" cy="80" r="8" fill="#fbbf24"/>
  <circle cx="109" cy="80" r="8" fill="#fbbf24"/>
  <circle cx="91" cy="80" r="4" fill="#1f2937"/>
  <circle cx="109" cy="80" r="4" fill="#1f2937"/>
  <!-- Beak -->
  <polygon points="100,88 96,93 104,93" fill="#d97706"/>
  <!-- Chest pattern -->
  <ellipse cx="100" cy="115" rx="15" ry="18" fill="#6b7280" opacity="0.5"/>
  <!-- Diamond count -->
  <text x="100" y="170" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#5eead4">2,500 💎</text>
  <!-- Title ribbon -->
  <rect x="25" y="28" width="150" height="22" rx="4" fill="#1e1b4b" opacity="0.7"/>
  <text x="100" y="44" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#99f6e4">SCRABBLE SAGE</text>
</svg>
