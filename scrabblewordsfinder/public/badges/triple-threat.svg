<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="tt-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eab308"/>
      <stop offset="100%" stop-color="#ca8a04"/>
    </linearGradient>
    <linearGradient id="tt-shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Badge shield -->
  <path d="M100 10 L180 50 L180 120 Q180 170 100 190 Q20 170 20 120 L20 50 Z" fill="url(#tt-bg)" stroke="#fde047" stroke-width="3"/>
  <path d="M100 10 L180 50 L180 85 Q100 95 20 85 L20 50 Z" fill="url(#tt-shine)"/>
  <!-- Trophy icon -->
  <path d="M75 70 L75 60 L125 60 L125 70" stroke="#92400e" stroke-width="3" fill="none"/>
  <path d="M75 70 L80 110 Q80 120 100 125 Q120 120 120 110 L125 70 Z" fill="#fbbf24" stroke="#f59e0b" stroke-width="2"/>
  <rect x="92" y="125" width="16" height="15" fill="#92400e"/>
  <rect x="80" y="138" width="40" height="6" rx="2" fill="#92400e"/>
  <!-- Cup handles -->
  <path d="M75 75 Q55 75 55 90 Q55 105 75 105" stroke="#f59e0b" stroke-width="3" fill="none"/>
  <path d="M125 75 Q145 75 145 90 Q145 105 125 105" stroke="#f59e0b" stroke-width="3" fill="none"/>
  <!-- Score range -->
  <text x="100" y="170" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#fef3c7">30–49 pts</text>
  <!-- Title ribbon -->
  <rect x="25" y="28" width="150" height="22" rx="4" fill="#713f12" opacity="0.8"/>
  <text x="100" y="44" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#fef08a">TRIPLE THREAT</text>
</svg>
