<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Logo 5: Squircle, biggest glass, multiple tiles from bag -->
  <rect x="3" y="3" width="58" height="58" rx="16" fill="#1e1b4b"/>
  <!-- Bag -->
  <path d="M6 28 Q6 24 10 24 L18 24 Q22 24 22 28 L22 40 Q22 44 18 44 L10 44 Q6 44 6 40 Z" fill="#4338ca" stroke="#6366f1" stroke-width="0.7"/>
  <path d="M8 24 Q14 21 20 24" fill="none" stroke="#818cf8" stroke-width="0.8"/>
  <!-- Tiles cascading out -->
  <rect x="9" y="46" width="9" height="9" rx="1.5" fill="white" transform="rotate(-12 13 50)"/>
  <text x="13" y="53" font-family="Georgia, serif" font-size="6" font-weight="bold" fill="#4338ca" text-anchor="middle" transform="rotate(-12 13 50)">B</text>
  <rect x="18" y="48" width="9" height="9" rx="1.5" fill="white" transform="rotate(7 22 52)"/>
  <text x="22" y="55" font-family="Georgia, serif" font-size="6" font-weight="bold" fill="#4338ca" text-anchor="middle" transform="rotate(7 22 52)">G</text>
  <rect x="26" y="44" width="9" height="9" rx="1.5" fill="white" transform="rotate(3 30 48)"/>
  <text x="30" y="51" font-family="Georgia, serif" font-size="6" font-weight="bold" fill="#4338ca" text-anchor="middle" transform="rotate(3 30 48)">M</text>
  <rect x="14" y="53" width="9" height="9" rx="1.5" fill="white" transform="rotate(18 18 57)" opacity="0.6"/>
  <text x="18" y="60" font-family="Georgia, serif" font-size="6" font-weight="bold" fill="#4338ca" text-anchor="middle" transform="rotate(18 18 57)">K</text>
  <!-- Large vintage glass -->
  <circle cx="44" cy="26" r="15" fill="#ecfdf5" fill-opacity="0.35"/>
  <circle cx="44" cy="26" r="15" fill="none" stroke="#d1d5db" stroke-width="3"/>
  <ellipse cx="37" cy="19" rx="5" ry="3" fill="white" opacity="0.4" transform="rotate(-20 37 19)"/>
  <!-- S tile magnified -->
  <rect x="36" y="18" width="16" height="16" rx="2.5" fill="white"/>
  <text x="44" y="30" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#3b82f6" text-anchor="middle">S</text>
  <text x="50" y="33" font-family="Arial" font-size="4.5" fill="#7c3aed">1</text>
  <!-- Handle -->
  <line x1="55" y1="37" x2="57" y2="39" stroke="#fbbf24" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="57" y1="39" x2="60" y2="56" stroke="#1c1917" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="57" y1="39" x2="60" y2="56" stroke="#44403c" stroke-width="3" stroke-linecap="round"/>
</svg>
