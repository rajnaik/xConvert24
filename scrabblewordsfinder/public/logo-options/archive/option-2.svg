<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Logo 2: Rounded square, glass magnifying S from bag, blue/purple -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="#312e81"/>
  <!-- Bag -->
  <path d="M8 22 Q8 18 12 18 L20 18 Q24 18 24 22 L24 34 Q24 38 20 38 L12 38 Q8 38 8 34 Z" fill="#4338ca" stroke="#818cf8" stroke-width="0.7"/>
  <path d="M10 18 Q16 15 22 18" fill="none" stroke="#818cf8" stroke-width="0.8"/>
  <!-- Tiles spilling -->
  <rect x="10" y="40" width="9" height="9" rx="1.5" fill="white" transform="rotate(-10 14 44)"/>
  <text x="14" y="47" font-family="Georgia, serif" font-size="6" font-weight="bold" fill="#3730a3" text-anchor="middle" transform="rotate(-10 14 44)">D</text>
  <rect x="18" y="43" width="9" height="9" rx="1.5" fill="white" transform="rotate(6 22 47)"/>
  <text x="22" y="50" font-family="Georgia, serif" font-size="6" font-weight="bold" fill="#3730a3" text-anchor="middle" transform="rotate(6 22 47)">F</text>
  <rect x="6" y="48" width="9" height="9" rx="1.5" fill="white" transform="rotate(14 10 52)"/>
  <text x="10" y="55" font-family="Georgia, serif" font-size="6" font-weight="bold" fill="#3730a3" text-anchor="middle" transform="rotate(14 10 52)">I</text>
  <!-- Magnifying glass — vintage -->
  <circle cx="44" cy="28" r="14" fill="#d1fae5" fill-opacity="0.3"/>
  <circle cx="44" cy="28" r="14" fill="none" stroke="#d1d5db" stroke-width="2.8"/>
  <ellipse cx="38" cy="22" rx="4" ry="2.5" fill="white" opacity="0.4" transform="rotate(-20 38 22)"/>
  <!-- S tile inside -->
  <rect x="37" y="21" width="14" height="14" rx="2" fill="white"/>
  <text x="44" y="32" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#3b82f6" text-anchor="middle">S</text>
  <text x="49" y="34" font-family="Arial" font-size="4" fill="#7c3aed">1</text>
  <!-- Handle -->
  <line x1="54" y1="38" x2="56" y2="40" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
  <line x1="56" y1="40" x2="60" y2="56" stroke="#292524" stroke-width="4" stroke-linecap="round"/>
  <line x1="56" y1="40" x2="60" y2="56" stroke="#57534e" stroke-width="2.5" stroke-linecap="round"/>
</svg>
