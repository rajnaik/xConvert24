<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Logo 1: Vintage magnifying glass with S tile, words falling from bag -->
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#1e1b4b"/>
  <!-- Scrabble bag (small pouch shape) -->
  <path d="M12 18 Q12 14 16 14 L24 14 Q28 14 28 18 L28 28 Q28 32 24 32 L16 32 Q12 32 12 28 Z" fill="#3730a3" stroke="#6366f1" stroke-width="0.8"/>
  <path d="M14 14 Q20 11 26 14" fill="none" stroke="#6366f1" stroke-width="1" stroke-linecap="round"/>
  <!-- Tiles falling out of bag -->
  <rect x="14" y="34" width="10" height="10" rx="1.5" fill="white" transform="rotate(-8 19 39)"/>
  <text x="19" y="42" font-family="Georgia, serif" font-size="7" font-weight="bold" fill="#1e1b4b" text-anchor="middle" transform="rotate(-8 19 39)">W</text>
  <rect x="22" y="38" width="10" height="10" rx="1.5" fill="white" transform="rotate(5 27 43)"/>
  <text x="27" y="46" font-family="Georgia, serif" font-size="7" font-weight="bold" fill="#1e1b4b" text-anchor="middle" transform="rotate(5 27 43)">O</text>
  <rect x="10" y="42" width="10" height="10" rx="1.5" fill="white" transform="rotate(12 15 47)"/>
  <text x="15" y="50" font-family="Georgia, serif" font-size="7" font-weight="bold" fill="#1e1b4b" text-anchor="middle" transform="rotate(12 15 47)">R</text>
  <!-- Vintage magnifying glass -->
  <circle cx="44" cy="30" r="13" fill="#ecfdf5" fill-opacity="0.4"/>
  <circle cx="44" cy="30" r="13" fill="none" stroke="#9ca3af" stroke-width="2.5"/>
  <circle cx="44" cy="30" r="13" fill="none" stroke="#d1d5db" stroke-width="1" opacity="0.5"/>
  <!-- Glare -->
  <ellipse cx="39" cy="25" rx="4" ry="2.5" fill="white" opacity="0.4" transform="rotate(-25 39 25)"/>
  <!-- S tile magnified inside lens -->
  <rect x="37" y="23" width="14" height="14" rx="2" fill="white" opacity="0.9"/>
  <text x="44" y="34" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#3b82f6" text-anchor="middle">S</text>
  <text x="49" y="36" font-family="Arial" font-size="4" fill="#7c3aed">1</text>
  <!-- Gold ferrule -->
  <line x1="53" y1="39" x2="55" y2="41" stroke="#fbbf24" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Handle -->
  <line x1="55" y1="41" x2="60" y2="56" stroke="#1c1917" stroke-width="4" stroke-linecap="round"/>
  <line x1="55" y1="41" x2="60" y2="56" stroke="#44403c" stroke-width="2.5" stroke-linecap="round"/>
</svg>
