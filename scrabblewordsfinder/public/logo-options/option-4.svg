<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Logo 4: Circle badge, horizontal glass, tiles cascade -->
  <circle cx="32" cy="32" r="30" fill="#0f172a" stroke="#3b82f6" stroke-width="2"/>
  <!-- Bag bottom-left -->
  <path d="M10 30 Q10 27 13 27 L19 27 Q22 27 22 30 L22 40 Q22 43 19 43 L13 43 Q10 43 10 40 Z" fill="#1e40af" stroke="#60a5fa" stroke-width="0.6"/>
  <path d="M11.5 27 Q16 24.5 20.5 27" fill="none" stroke="#60a5fa" stroke-width="0.7"/>
  <!-- Tiles spilling right -->
  <rect x="20" y="44" width="9" height="9" rx="1.5" fill="white" transform="rotate(-5 24 48)"/>
  <text x="24" y="51" font-family="Georgia, serif" font-size="6" font-weight="bold" fill="#1e3a8a" text-anchor="middle" transform="rotate(-5 24 48)">A</text>
  <rect x="28" y="46" width="9" height="9" rx="1.5" fill="white" transform="rotate(8 32 50)"/>
  <text x="32" y="53" font-family="Georgia, serif" font-size="6" font-weight="bold" fill="#1e3a8a" text-anchor="middle" transform="rotate(8 32 50)">L</text>
  <rect x="13" y="46" width="9" height="9" rx="1.5" fill="white" transform="rotate(15 17 50)" opacity="0.7"/>
  <text x="17" y="53" font-family="Georgia, serif" font-size="6" font-weight="bold" fill="#1e3a8a" text-anchor="middle" transform="rotate(15 17 50)">P</text>
  <!-- Glass — slightly tilted -->
  <g transform="rotate(-10 44 24)">
    <circle cx="44" cy="24" r="13" fill="#d1fae5" fill-opacity="0.3"/>
    <circle cx="44" cy="24" r="13" fill="none" stroke="#d4d4d8" stroke-width="2.5"/>
    <ellipse cx="39" cy="19" rx="3.5" ry="2" fill="white" opacity="0.4"/>
    <rect x="37" y="17" width="14" height="14" rx="2" fill="white"/>
    <text x="44" y="28" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#3b82f6" text-anchor="middle">S</text>
    <text x="49" y="30" font-family="Arial" font-size="4" fill="#7c3aed">1</text>
    <line x1="53" y1="33" x2="55" y2="35" stroke="#fbbf24" stroke-width="2.8" stroke-linecap="round"/>
    <line x1="55" y1="35" x2="59" y2="48" stroke="#292524" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="55" y1="35" x2="59" y2="48" stroke="#44403c" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
