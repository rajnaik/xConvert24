<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Logo 3: Shield shape, tiles + glass, Facebook blue accent -->
  <path d="M32 4 L56 14 L56 36 Q56 54 32 60 Q8 54 8 36 L8 14 Z" fill="#1e3a8a" stroke="#3b82f6" stroke-width="1.5"/>
  <!-- Bag top-left -->
  <path d="M14 20 Q14 17 17 17 L23 17 Q26 17 26 20 L26 28 Q26 31 23 31 L17 31 Q14 31 14 28 Z" fill="#1d4ed8" stroke="#60a5fa" stroke-width="0.6"/>
  <!-- Tiles falling -->
  <rect x="15" y="33" width="8" height="8" rx="1.5" fill="white" transform="rotate(-6 19 37)"/>
  <text x="19" y="39" font-family="Georgia, serif" font-size="5.5" font-weight="bold" fill="#1e3a8a" text-anchor="middle" transform="rotate(-6 19 37)">N</text>
  <rect x="22" y="36" width="8" height="8" rx="1.5" fill="white" transform="rotate(8 26 40)"/>
  <text x="26" y="42" font-family="Georgia, serif" font-size="5.5" font-weight="bold" fill="#1e3a8a" text-anchor="middle" transform="rotate(8 26 40)">E</text>
  <rect x="12" y="40" width="8" height="8" rx="1.5" fill="white" transform="rotate(12 16 44)"/>
  <text x="16" y="46" font-family="Georgia, serif" font-size="5.5" font-weight="bold" fill="#1e3a8a" text-anchor="middle" transform="rotate(12 16 44)">T</text>
  <!-- Glass -->
  <circle cx="42" cy="28" r="12" fill="#ecfdf5" fill-opacity="0.35"/>
  <circle cx="42" cy="28" r="12" fill="none" stroke="#e5e7eb" stroke-width="2.5"/>
  <ellipse cx="37" cy="23" rx="3.5" ry="2" fill="white" opacity="0.4" transform="rotate(-25 37 23)"/>
  <!-- S tile -->
  <rect x="36" y="22" width="12" height="12" rx="2" fill="white"/>
  <text x="42" y="31" font-family="Georgia, serif" font-size="9" font-weight="bold" fill="#3b82f6" text-anchor="middle">S</text>
  <text x="46" y="33" font-family="Arial" font-size="3.5" fill="#7c3aed">1</text>
  <!-- Handle -->
  <line x1="50" y1="36" x2="52" y2="38" stroke="#fbbf24" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="52" y1="38" x2="55" y2="50" stroke="#1c1917" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="52" y1="38" x2="55" y2="50" stroke="#44403c" stroke-width="2" stroke-linecap="round"/>
</svg>
