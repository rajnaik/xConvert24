<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" width="220" height="220">
  <defs>
    <linearGradient id="satinGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF0A0"/>
      <stop offset="20%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#DAA520"/>
      <stop offset="80%" stop-color="#B8860B"/>
      <stop offset="100%" stop-color="#CD9B1D"/>
    </linearGradient>
    <linearGradient id="satinGoldLight" x1="0%" y1="0%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#FFEC80"/>
      <stop offset="40%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#DAA520"/>
    </linearGradient>
    <radialGradient id="sheen" cx="30%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#FFFDE0" stop-opacity="0.45"/>
      <stop offset="50%" stop-color="#FFD700" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="silver" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D0D0D0"/>
      <stop offset="30%" stop-color="#F5F5F5"/>
      <stop offset="50%" stop-color="#FFFFFF"/>
      <stop offset="70%" stop-color="#E0E0E0"/>
      <stop offset="100%" stop-color="#B0B0B0"/>
    </linearGradient>
    <linearGradient id="dBlue1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B3E5FC"/>
      <stop offset="50%" stop-color="#4FC3F7"/>
      <stop offset="100%" stop-color="#0277BD"/>
    </linearGradient>
    <linearGradient id="dBlue2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E1F5FE"/>
      <stop offset="50%" stop-color="#29B6F6"/>
      <stop offset="100%" stop-color="#01579B"/>
    </linearGradient>
    <linearGradient id="dBlue3" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#80D8FF"/>
      <stop offset="50%" stop-color="#039BE5"/>
      <stop offset="100%" stop-color="#01579B"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softFold">
      <feGaussianBlur stdDeviation="0.8"/>
    </filter>
    <filter id="softEdge">
      <feGaussianBlur stdDeviation="0.4"/>
    </filter>
  </defs>

  <!-- 
    Canvas: 220x220 (square)
    Bag sits in lower portion: y=110 to y=210
    Open fall space above: y=10 to y=110 (diamonds travel here)
    Bag flare top: y=110 to y=118 (8%)
    Bag body: y=118 to y=210 (92%)
  -->

  <!-- === BAG BODY (lower half of canvas) === -->
  <path d="M82,118 
           C79,135 72,155 68,172 
           Q64,190 66,198 
           Q70,208 85,212 
           Q98,216 110,216 
           Q122,216 135,212 
           Q150,208 154,198 
           Q156,190 152,172 
           C148,155 141,135 138,118" 
        fill="url(#satinGold)" stroke="#B8860B" stroke-width="0.5" stroke-opacity="0.4" filter="url(#softEdge)"/>
  <path d="M82,118 
           C79,135 72,155 68,172 
           Q64,190 66,198 
           Q70,208 85,212 
           Q98,216 110,216 
           Q122,216 135,212 
           Q150,208 154,198 
           Q156,190 152,172 
           C148,155 141,135 138,118" 
        fill="url(#sheen)"/>

  <!-- Soft fabric folds -->
  <g filter="url(#softFold)" opacity="0.2">
    <path d="M87,122 C84,140 78,160 74,180 Q72,195 75,206" stroke="#B8860B" stroke-width="1" fill="none"/>
    <path d="M95,119 C93,138 88,158 86,175 Q84,192 87,206" stroke="#B8860B" stroke-width="0.9" fill="none"/>
    <path d="M110,118 C110,138 110,158 110,178 Q110,195 110,212" stroke="#B8860B" stroke-width="0.7" fill="none"/>
    <path d="M125,119 C127,138 132,158 134,175 Q136,192 133,206" stroke="#B8860B" stroke-width="0.9" fill="none"/>
    <path d="M133,122 C136,140 142,160 146,180 Q148,195 145,206" stroke="#B8860B" stroke-width="1" fill="none"/>
  </g>

  <!-- Cinch line -->
  <path d="M82,118 Q110,115 138,118" stroke="#B8860B" stroke-width="1.3" fill="none" opacity="0.45" filter="url(#softFold)"/>

  <!-- === FLARED TOP (tiny 8% lip) === -->
  <path d="M82,118 
           C80,114 76,111 73,110 
           Q110,108 147,110 
           C144,111 140,114 138,118" 
        fill="url(#satinGoldLight)" stroke="#B8860B" stroke-width="0.4" stroke-opacity="0.3" filter="url(#softEdge)"/>

  <!-- Top rim -->
  <path d="M73,110 Q110,107 147,110" stroke="#DAA520" stroke-width="0.9" fill="none" opacity="0.5" filter="url(#softEdge)"/>

  <!-- Inner shadow -->
  <ellipse cx="110" cy="111" rx="34" ry="2" fill="#8B6914" opacity="0.12" filter="url(#softFold)"/>

  <!-- === SILVER DRAWSTRINGS === -->
  <path d="M82,117 C75,125 66,136 60,148 Q56,156 58,163" 
        stroke="url(#silver)" stroke-width="2" fill="none" stroke-linecap="round">
    <animate attributeName="d" 
             values="M82,117 C75,125 66,136 60,148 Q56,156 58,163;M82,117 C74,127 64,138 58,151 Q54,159 56,166;M82,117 C75,125 66,136 60,148 Q56,156 58,163" 
             dur="3.5s" repeatCount="indefinite"/>
  </path>
  <path d="M138,117 C145,125 154,136 160,148 Q164,156 162,163" 
        stroke="url(#silver)" stroke-width="2" fill="none" stroke-linecap="round">
    <animate attributeName="d" 
             values="M138,117 C145,125 154,136 160,148 Q164,156 162,163;M138,117 C146,127 156,138 162,151 Q166,159 164,166;M138,117 C145,125 154,136 160,148 Q164,156 162,163" 
             dur="3.5s" repeatCount="indefinite"/>
  </path>

  <!-- === BLUE DIAMONDS — falling from top of canvas into bag === -->
  <!-- Now they have a long travel distance (y=10 → y=112) making it very visible -->

  <!-- DIAMOND-CUT 1 — from upper-left -->
  <g filter="url(#glow)">
    <polygon points="0,-11 7,-4 4,9 -4,9 -7,-4" fill="url(#dBlue1)" stroke="#0277BD" stroke-width="0.6">
      <animateTransform attributeName="transform" type="translate"
        values="80,12; 88,35; 96,60; 104,85; 109,108"
        dur="2.4s" repeatCount="indefinite"
        keyTimes="0;0.25;0.5;0.78;1"
        calcMode="spline" keySplines="0.2 0 0.8 1;0.3 0 0.7 1;0.3 0 0.7 1;0.4 0 0.6 1"/>
      <animateTransform attributeName="transform" type="rotate"
        values="0;20;45;30;0" additive="sum" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0.5;0" dur="2.4s" repeatCount="indefinite" keyTimes="0;0.06;0.6;0.88;1"/>
    </polygon>
  </g>

  <!-- DIAMOND-CUT 2 — from upper-right -->
  <g filter="url(#glow)">
    <polygon points="0,-9 6,-3 4,7 -4,7 -6,-3" fill="url(#dBlue2)" stroke="#01579B" stroke-width="0.6">
      <animateTransform attributeName="transform" type="translate"
        values="148,15; 138,38; 126,62; 118,86; 112,108"
        dur="2.7s" repeatCount="indefinite" begin="1s"
        keyTimes="0;0.25;0.5;0.78;1"
        calcMode="spline" keySplines="0.2 0 0.8 1;0.3 0 0.7 1;0.3 0 0.7 1;0.4 0 0.6 1"/>
      <animateTransform attributeName="transform" type="rotate"
        values="0;-18;-38;-22;0" additive="sum" dur="2.7s" repeatCount="indefinite" begin="1s"/>
      <animate attributeName="opacity" values="0;1;1;0.5;0" dur="2.7s" repeatCount="indefinite" begin="1s" keyTimes="0;0.06;0.6;0.88;1"/>
    </polygon>
  </g>

  <!-- DIAMOND-CUT 3 — from center top -->
  <g filter="url(#glow)">
    <polygon points="0,-8 5,-3 3,6 -3,6 -5,-3" fill="url(#dBlue3)" stroke="#0288D1" stroke-width="0.5">
      <animateTransform attributeName="transform" type="translate"
        values="110,8; 110,32; 110,58; 110,84; 110,108"
        dur="3s" repeatCount="indefinite" begin="2.4s"
        keyTimes="0;0.25;0.5;0.78;1"
        calcMode="spline" keySplines="0.2 0 0.8 1;0.3 0 0.7 1;0.3 0 0.7 1;0.4 0 0.6 1"/>
      <animateTransform attributeName="transform" type="rotate"
        values="0;12;25;16;0" additive="sum" dur="3s" repeatCount="indefinite" begin="2.4s"/>
      <animate attributeName="opacity" values="0;1;1;0.5;0" dur="3s" repeatCount="indefinite" begin="2.4s" keyTimes="0;0.06;0.6;0.88;1"/>
    </polygon>
  </g>

  <!-- RHOMBUS 1 — from right -->
  <g filter="url(#glow)">
    <polygon points="0,-10 8,0 0,10 -8,0" fill="url(#dBlue2)" stroke="#01579B" stroke-width="0.6">
      <animateTransform attributeName="transform" type="translate"
        values="140,10; 132,34; 122,58; 116,84; 111,108"
        dur="2.5s" repeatCount="indefinite" begin="0.5s"
        keyTimes="0;0.25;0.5;0.78;1"
        calcMode="spline" keySplines="0.2 0 0.8 1;0.3 0 0.7 1;0.3 0 0.7 1;0.4 0 0.6 1"/>
      <animateTransform attributeName="transform" type="rotate"
        values="0;-12;-25;-15;0" additive="sum" dur="2.5s" repeatCount="indefinite" begin="0.5s"/>
      <animate attributeName="opacity" values="0;1;1;0.5;0" dur="2.5s" repeatCount="indefinite" begin="0.5s" keyTimes="0;0.06;0.6;0.88;1"/>
    </polygon>
  </g>

  <!-- RHOMBUS 2 — from left -->
  <g filter="url(#glow)">
    <polygon points="0,-9 7,0 0,9 -7,0" fill="url(#dBlue1)" stroke="#0277BD" stroke-width="0.6">
      <animateTransform attributeName="transform" type="translate"
        values="75,14; 84,37; 94,61; 103,85; 109,108"
        dur="2.8s" repeatCount="indefinite" begin="1.7s"
        keyTimes="0;0.25;0.5;0.78;1"
        calcMode="spline" keySplines="0.2 0 0.8 1;0.3 0 0.7 1;0.3 0 0.7 1;0.4 0 0.6 1"/>
      <animateTransform attributeName="transform" type="rotate"
        values="0;15;30;18;0" additive="sum" dur="2.8s" repeatCount="indefinite" begin="1.7s"/>
      <animate attributeName="opacity" values="0;1;1;0.5;0" dur="2.8s" repeatCount="indefinite" begin="1.7s" keyTimes="0;0.06;0.6;0.88;1"/>
    </polygon>
  </g>

  <!-- RHOMBUS 3 — from far right -->
  <g filter="url(#glow)">
    <polygon points="0,-7 6,0 0,7 -6,0" fill="url(#dBlue3)" stroke="#0288D1" stroke-width="0.5">
      <animateTransform attributeName="transform" type="translate"
        values="155,18; 142,40; 128,63; 118,86; 112,108"
        dur="2.3s" repeatCount="indefinite" begin="3.2s"
        keyTimes="0;0.25;0.5;0.78;1"
        calcMode="spline" keySplines="0.2 0 0.8 1;0.3 0 0.7 1;0.3 0 0.7 1;0.4 0 0.6 1"/>
      <animateTransform attributeName="transform" type="rotate"
        values="0;-20;-40;-25;0" additive="sum" dur="2.3s" repeatCount="indefinite" begin="3.2s"/>
      <animate attributeName="opacity" values="0;1;1;0.5;0" dur="2.3s" repeatCount="indefinite" begin="3.2s" keyTimes="0;0.06;0.6;0.88;1"/>
    </polygon>
  </g>

  <!-- === SPARKLES === -->
  <g opacity="0.5">
    <circle cx="55" cy="175" r="1.3" fill="#4FC3F7">
      <animate attributeName="opacity" values="0;1;0" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="168" cy="170" r="1" fill="#29B6F6">
      <animate attributeName="opacity" values="0;1;0" dur="2.1s" repeatCount="indefinite" begin="0.6s"/>
    </circle>
    <circle cx="110" cy="218" r="0.8" fill="#B3E5FC">
      <animate attributeName="opacity" values="0;0.8;0" dur="1.5s" repeatCount="indefinite" begin="1s"/>
    </circle>
    <circle cx="58" cy="198" r="0.7" fill="#E1F5FE">
      <animate attributeName="opacity" values="0;1;0" dur="1.3s" repeatCount="indefinite" begin="0.4s"/>
    </circle>
    <circle cx="164" cy="195" r="0.8" fill="#80D8FF">
      <animate attributeName="opacity" values="0;0.9;0" dur="1.6s" repeatCount="indefinite" begin="0.8s"/>
    </circle>
  </g>
</svg>
