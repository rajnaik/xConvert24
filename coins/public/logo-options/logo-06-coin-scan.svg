  <circle cx="50" cy="50" r="24" fill="none" stroke="#3f3f5a" stroke-width="1"/>
  <text x="38" y="58" font-family="Arial,sans-serif" font-size="20" font-weight="800" fill="#c084fc">X</text>
  <!-- Scan line -->
