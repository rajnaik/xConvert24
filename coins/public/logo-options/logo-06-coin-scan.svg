  <!-- Text -->
  <text x="100" y="42" font-family="Arial,sans-serif" font-size="20" font-weight="700" fill="#fafafa">xCrypto</text>
  <text x="100" y="70" font-family="Arial,sans-serif" font-size="28" font-weight="800" fill="#8b5cf6">24</text>
