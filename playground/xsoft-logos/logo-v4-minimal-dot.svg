<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" fill="none">
  <defs>
    <linearGradient id="g4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
  </defs>
  <!-- Minimal: just the word with a glowing dot on the x -->
  <text x="10" y="44" font-family="system-ui, -apple-system, sans-serif" font-size="38" font-weight="900" letter-spacing="-1" fill="url(#g4)">xSoft</text>
  <!-- Accent dot above the x -->
  <circle cx="22" cy="10" r="4" fill="url(#g4)"/>
