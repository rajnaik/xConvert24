<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5e5ce6"/>
      <stop offset="100%" style="stop-color:#bf5af2"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <!-- Cog (large, center-left) -->
  <g transform="translate(38, 42)" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="22" cy="22" r="8"/>
    <path d="M22 4v4M22 36v4M4 22h4M36 22h4M9.5 9.5l2.8 2.8M31.7 31.7l2.8 2.8M9.5 34.5l2.8-2.8M31.7 12.3l2.8-2.8"/>
  </g>
  <!-- Timer arc (top-right) -->
  <g transform="translate(72, 20)" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="3" stroke-linecap="round">
    <circle cx="16" cy="18" r="13" stroke-dasharray="60 82" stroke-dashoffset="-10"/>
    <line x1="16" y1="18" x2="16" y2="9"/>
    <line x1="16" y1="18" x2="22" y2="16"/>
    <!-- Timer top tick -->
    <line x1="16" y1="2" x2="16" y2="5"/>
    <rect x="13" y="0" width="6" height="3" rx="1" fill="rgba(255,255,255,0.9)" stroke="none"/>
  </g>
  <!-- Mouse pointer (bottom-right, clicking) -->
  <g transform="translate(74, 68)">
    <path d="M6 4l0 28 8-8 6 14 5-2-6-14 10-2z" fill="white" stroke="none" opacity="0.95"/>
  </g>
  <!-- Click ripple -->
  <circle cx="80" cy="72" r="6" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <circle cx="80" cy="72" r="10" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
</svg>
