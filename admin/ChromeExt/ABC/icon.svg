<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#c4b5fd"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  
  <!-- Large Cog (left side) -->
  <g transform="translate(14, 34)">
    <path d="M30 18.5l2.5-1.5 1-3.5h3l1 3.5 2.5 1.5 3.5-0.5 2 2.2-1.5 3.2 1 2.8 3.5 1v3l-3.5 1-1 2.8 1.5 3.2-2 2.2-3.5-0.5-2.5 1.5-1 3.5h-3l-1-3.5-2.5-1.5-3.5 0.5-2-2.2 1.5-3.2-1-2.8-3.5-1v-3l3.5-1 1-2.8-1.5-3.2 2-2.2 3.5 0.5z" fill="white" opacity="0.95"/>
    <circle cx="31" cy="28" r="8" fill="url(#bg)"/>
  </g>
  
  <!-- Mouse Pointer (center-right) -->
  <g transform="translate(62, 52)">
    <path d="M8 2v36l10-10 7 16 6-3-7-16 12-3z" fill="white" opacity="0.95"/>
  </g>
  
  <!-- Watch/Clock (top-right) -->
  <g transform="translate(72, 10)">
    <!-- Watch band top -->
    <rect x="12" y="0" width="12" height="6" rx="2" fill="white" opacity="0.7"/>
    <!-- Watch face -->
    <circle cx="18" cy="22" r="15" fill="white" opacity="0.2" stroke="white" stroke-width="3"/>
    <circle cx="18" cy="22" r="12" fill="none" stroke="white" stroke-width="2" opacity="0.9"/>
    <!-- Hour hand -->
    <line x1="18" y1="22" x2="18" y2="13" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Minute hand -->
    <line x1="18" y1="22" x2="25" y2="19" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <!-- Center dot -->
    <circle cx="18" cy="22" r="2" fill="white"/>
    <!-- Watch band bottom -->
    <rect x="12" y="38" width="12" height="6" rx="2" fill="white" opacity="0.7"/>
  </g>
</svg>
