<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- Background -->
  <rect width="128" height="128" rx="24" fill="#1c1c1e"/>
  <!-- Cog/gear -->
  <g transform="translate(20, 20)">
    <circle cx="35" cy="35" r="18" fill="none" stroke="#5e5ce6" stroke-width="5"/>
    <circle cx="35" cy="35" r="8" fill="#5e5ce6"/>
    <!-- Gear teeth -->
    <rect x="31" y="8" width="8" height="10" rx="2" fill="#5e5ce6"/>
    <rect x="31" y="52" width="8" height="10" rx="2" fill="#5e5ce6"/>
    <rect x="8" y="31" width="10" height="8" rx="2" fill="#5e5ce6"/>
    <rect x="52" y="31" width="10" height="8" rx="2" fill="#5e5ce6"/>
    <rect x="12" y="12" width="8" height="8" rx="2" fill="#5e5ce6" transform="rotate(45 16 16)"/>
    <rect x="50" y="12" width="8" height="8" rx="2" fill="#5e5ce6" transform="rotate(45 54 16)"/>
    <rect x="12" y="50" width="8" height="8" rx="2" fill="#5e5ce6" transform="rotate(45 16 54)"/>
    <rect x="50" y="50" width="8" height="8" rx="2" fill="#5e5ce6" transform="rotate(45 54 54)"/>
  </g>
  <!-- Cursor pointer -->
  <path d="M70 55 L70 95 L80 87 L88 102 L94 99 L86 84 L96 80 Z" fill="white" stroke="#1c1c1e" stroke-width="1.5"/>
  <!-- Button -->
  <rect x="60" y="100" width="50" height="18" rx="6" fill="#30d158"/>
  <text x="85" y="113" font-family="-apple-system, sans-serif" font-size="9" font-weight="600" fill="#000" text-anchor="middle">CLICK</text>
</svg>
