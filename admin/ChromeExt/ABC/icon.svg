<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#c4b5fd"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  
  <!-- Curved arrows connecting the three icons -->
  <path d="M 36 50 Q 64 20 92 45" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <polygon points="90,41 96,46 89,48" fill="white" opacity="0.5"/>
  
  <path d="M 95 55 Q 100 80 75 100" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <polygon points="78,99 73,103 74,96" fill="white" opacity="0.5"/>
  
  <path d="M 58 102 Q 30 90 30 60" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <polygon points="31,63 27,57 34,58" fill="white" opacity="0.5"/>
  
  <!-- Large Cog (top-left) -->
  <g transform="translate(10, 22) scale(1.4)">
    <path d="M20 12l1.8-1 .7-2.5h2.2l.7 2.5 1.8 1 2.5-.4 1.4 1.6-1.1 2.3.7 2 2.5.7v2.2l-2.5.7-.7 2 1.1 2.3-1.4 1.6-2.5-.4-1.8 1-.7 2.5h-2.2l-.7-2.5-1.8-1-2.5.4-1.4-1.6 1.1-2.3-.7-2-2.5-.7v-2.2l2.5-.7.7-2-1.1-2.3 1.4-1.6 2.5.4z" fill="white" opacity="0.95"/>
    <circle cx="21.1" cy="19.5" r="5.5" fill="url(#bg)"/>
  </g>
  
  <!-- Mouse Pointer (top-right) -->
  <g transform="translate(80, 22) scale(1.3)">
    <path d="M6 2v28l8-8 5 12 5-2-5-12 9-2z" fill="white" opacity="0.95"/>
  </g>
  
  <!-- Watch/Clock (bottom-center) -->
  <g transform="translate(44, 72) scale(1.3)">
    <!-- Watch band top -->
    <rect x="10" y="0" width="10" height="5" rx="2" fill="white" opacity="0.7"/>
    <!-- Watch face -->
    <circle cx="15" cy="18" r="13" fill="white" opacity="0.15" stroke="white" stroke-width="2.5"/>
    <circle cx="15" cy="18" r="10" fill="none" stroke="white" stroke-width="2" opacity="0.95"/>
    <!-- Hour markers -->
    <line x1="15" y1="10" x2="15" y2="12" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="15" y1="24" x2="15" y2="26" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="7" y1="18" x2="9" y2="18" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="21" y1="18" x2="23" y2="18" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Hour hand -->
    <line x1="15" y1="18" x2="15" y2="12" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Minute hand -->
    <line x1="15" y1="18" x2="21" y2="15" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <!-- Center dot -->
    <circle cx="15" cy="18" r="1.8" fill="white"/>
    <!-- Watch band bottom -->
    <rect x="10" y="32" width="10" height="5" rx="2" fill="white" opacity="0.7"/>
  </g>
</svg>
