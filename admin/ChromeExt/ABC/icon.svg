<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#c4b5fd"/>
    </linearGradient>
    <filter id="emboss">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1" flood-color="#000" flood-opacity="0.35"/>
      <feDropShadow dx="0" dy="-0.5" stdDeviation="0.5" flood-color="#fff" flood-opacity="0.2"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  
  <!-- Thin dark curved arrows -->
  <path d="M 40 48 Q 64 22 90 44" fill="none" stroke="#4c1d95" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <polygon points="88,40 94,44 87,47" fill="#4c1d95" opacity="0.7"/>
  <path d="M 94 54 Q 102 78 72 100" fill="none" stroke="#4c1d95" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <polygon points="75,98 70,103 72,95" fill="#4c1d95" opacity="0.7"/>
  <path d="M 56 100 Q 28 88 32 56" fill="none" stroke="#4c1d95" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <polygon points="33,59 29,53 36,55" fill="#4c1d95" opacity="0.7"/>
  
  <!-- Large Cog (top-left) — moved inward so no clipping -->
  <g transform="translate(16, 24)" filter="url(#emboss)">
    <!-- Outer gear shape with 8 teeth -->
    <path d="M22,8 l2,-2 h4 l2,2 l0.5,3 l3,1.5 l2.5,-1.5 l3,1 l1,3 l-1.5,2.5 l1.5,3 l3,0.5 l1,3 h-3 l-1.5,3 l1.5,2.5 l-1,3 l-3,1 l-2.5,-1.5 l-3,1.5 l-0.5,3 l-2,2 h-4 l-2,-2 l-0.5,-3 l-3,-1.5 l-2.5,1.5 l-3,-1 l-1,-3 l1.5,-2.5 l-1.5,-3 l-3,-0.5 l-1,-3 h3 l1.5,-3 l-1.5,-2.5 l1,-3 l3,-1 l2.5,1.5 l3,-1.5z" fill="white"/>
    <circle cx="24" cy="22" r="7" fill="url(#bg)"/>
  </g>
  
  <!-- Mouse Pointer (top-right) — smaller, angled inward toward center -->
  <g transform="translate(82, 24) rotate(20, 10, 14)" filter="url(#emboss)">
    <path d="M4 0v24l7-7 5 11 4-2-5-10 8-2z" fill="white"/>
  </g>
  
  <!-- Watch/Clock (bottom-center) -->
  <g transform="translate(42, 68)" filter="url(#emboss)">
    <rect x="12" y="0" width="10" height="5" rx="2" fill="white" opacity="0.85"/>
    <circle cx="17" cy="20" r="15" fill="white" opacity="0.95"/>
    <circle cx="17" cy="20" r="12" fill="url(#bg)" opacity="0.3"/>
    <circle cx="17" cy="20" r="12" fill="none" stroke="white" stroke-width="2"/>
    <line x1="17" y1="10" x2="17" y2="12.5" stroke="#4c1d95" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="17" y1="27.5" x2="17" y2="30" stroke="#4c1d95" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="7" y1="20" x2="9.5" y2="20" stroke="#4c1d95" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="24.5" y1="20" x2="27" y2="20" stroke="#4c1d95" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="17" y1="20" x2="17" y2="13" stroke="#4c1d95" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="17" y1="20" x2="23" y2="17" stroke="#4c1d95" stroke-width="2" stroke-linecap="round"/>
    <circle cx="17" cy="20" r="2" fill="#4c1d95"/>
    <rect x="12" y="36" width="10" height="5" rx="2" fill="white" opacity="0.85"/>
  </g>
</svg>
