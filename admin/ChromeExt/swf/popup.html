<!DOCTYPE html>
<html>
<head>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 380px; max-height: 500px; font-family: -apple-system, Inter, sans-serif; background: #0f0a1e; color: #e2e8f0; padding: 16px; overflow-y: auto; }
    .header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .header img { width: 28px; height: 28px; border-radius: 6px; }
    .header h1 { font-size: 14px; color: #a78bfa; }
    .tiles-row { display: flex; gap: 4px; margin-bottom: 8px; }
    .tile-input { width: 40px; height: 44px; text-align: center; background: #1e1b4b; border: 2px solid #4338ca; border-radius: 8px; color: #93c5fd; font-size: 20px; font-family: Georgia, serif; font-weight: bold; text-transform: uppercase; outline: none; }
    .tile-input:focus { border-color: #7c3aed; box-shadow: 0 0 0 2px rgba(124,58,237,0.3); }
    .hint { font-size: 10px; color: #6b7280; margin-bottom: 10px; }
    .results-header { font-size: 11px; color: #9ca3af; margin-bottom: 6px; }
    .results { max-height: 250px; overflow-y: auto; }
    .word-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 8px; border-radius: 6px; cursor: pointer; }
    .word-row:hover { background: #1e1b4b; }
    .word-text { font-family: Georgia, serif; font-size: 15px; font-weight: bold; color: #e2e8f0; text-transform: uppercase; letter-spacing: 1px; }
    .word-score { font-size: 12px; font-weight: 600; color: #fbbf24; }
    .links { margin-top: 12px; padding-top: 10px; border-top: 1px solid #312e81; display: flex; flex-wrap: wrap; gap: 6px; }
    .links a { font-size: 10px; color: #7c3aed; text-decoration: none; padding: 3px 8px; border: 1px solid #4338ca; border-radius: 12px; }
    .links a:hover { background: #4338ca; color: white; }
    .footer { margin-top: 10px; text-align: center; font-size: 9px; color: #4b5563; }
    .footer a { color: #6366f1; text-decoration: none; }
    .cta { display: block; margin-top: 10px; padding: 8px; background: #4338ca; color: white; text-align: center; border-radius: 8px; font-size: 11px; font-weight: 600; text-decoration: none; }
    .cta:hover { background: #5b21b6; }
    .empty { text-align: center; color: #6b7280; font-size: 12px; padding: 20px 0; }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon-48.png" alt="SWF" />
    <h1>Scrabble Word Finder</h1>
  </div>

  <div class="tiles-row" id="tiles-row"></div>
  <p class="hint">Type letters (use ? for blanks) — results appear instantly</p>

  <div id="results-area">
    <div class="empty">Enter your rack tiles above</div>
  </div>

  <a href="https://www.scrabblewordsfinder.com?ref=chrome-ext" target="_blank" class="cta">
    🎯 Open Full Solver — Rack Leave, Probability, Best Openers →
  </a>

  <div class="links">
    <a href="https://www.scrabblewordsfinder.com/guide?ref=chrome-ext" target="_blank">📘 Guide</a>
    <a href="https://www.scrabblewordsfinder.com/blog?ref=chrome-ext" target="_blank">📝 Blog</a>
    <a href="https://www.xconvert24.com?ref=swf-ext" target="_blank">🔧 xConvert24</a>
    <a href="https://www.xconvert24.com/tools?ref=swf-ext" target="_blank">🛠️ Free Tools</a>
  </div>

  <div class="footer">
    Powered by <a href="https://www.scrabblewordsfinder.com?ref=chrome-ext" target="_blank">ScrabbleWordsFinder.com</a> | <a href="https://www.xconvert24.com?ref=swf-ext" target="_blank">xConvert24</a>
  </div>

  <script src="solver.js"></script>
  <script src="popup.js"></script>
</body>
</html>
